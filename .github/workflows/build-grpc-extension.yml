name: Build gRPC Extension WASM

on:
  push:
    branches: [main]
    paths:
      - 'extensions/grpc/**'
      - '.github/workflows/build-grpc-extension.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build WASM
        run: cargo build --release --target wasm32-wasip2 -p grpc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpc-extension-wasm
          path: target/wasm32-wasip2/release/grpc.wasm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: grpc-v0.2.2
          files: target/wasm32-wasip2/release/grpc.wasm
          make_latest: true
          body: |
            Patched gRPC extension that forwards SubgraphHeaders as gRPC metadata.

            Based on upstream grafbase/extensions gRPC v0.2.1.
            Change: `_headers: SubgraphHeaders` → forwarded as gRPC metadata via `headers.iter()`.
